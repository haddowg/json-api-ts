# Local hooks run via the project's own toolchain (pnpm). Install once with
# `pre-commit install`. oxfmt and oxlint operate on the staged files; the
# typecheck runs project-wide (tsc needs the whole program), only when a TS file
# changed.
repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt (write)
        entry: pnpm exec oxfmt --write
        language: system
        types_or: [ts, tsx, javascript, jsx, json, yaml, markdown]
        # Mirror the committable entries of .oxfmtrc.json `ignorePatterns`: oxfmt
        # exits non-zero ("Expected at least one target file") if every path it is
        # handed is ignored, which would fail any commit touching only generated
        # output, the lockfile, the raw codegen fixtures, or the docs. Keep the two
        # in sync. docs/ is excluded because MkDocs Material's admonition/collapsible
        # syntax (indented content under `!!!`/`???` markers) is not CommonMark, and
        # oxfmt de-indents it — corrupting the rendered site. mkdocs --strict guards
        # the docs instead (see the mkdocs-build hook below).
        exclude: |
          (?x)^(
            docs/|
            packages/codegen/test/fixtures/|
            pnpm-lock\.yaml$|
            .*\.gen\.ts$
          )

      - id: oxlint
        name: oxlint
        entry: pnpm exec oxlint
        language: system
        types_or: [ts, tsx, javascript, jsx]
        # Mirror the oxfmt exclude (and .oxlintrc.json `ignorePatterns`): oxlint exits
        # non-zero ("No files found to lint") when every path it is handed is ignored, so a
        # commit touching only generated clients would fail. oxlint ignores these paths
        # anyway; excluding them here keeps such a commit from being handed an all-ignored set.
        exclude: |
          (?x)^(
            packages/codegen/test/fixtures/|
            pnpm-lock\.yaml$|
            .*\.gen\.ts$
          )

      - id: typecheck
        name: tsc typecheck
        entry: pnpm typecheck
        language: system
        files: \.(m|c)?tsx?$
        pass_filenames: false

      - id: mkdocs-build
        name: mkdocs build (strict)
        entry: mkdocs build --strict
        language: system
        files: ^(docs/.*|mkdocs\.yml|mkdocs_hooks\.py)$
        pass_filenames: false
