name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Drift gate: regenerate the committed client from the pinned fixture spec and fail if
      # it differs from what is checked in (the provenance-stamped `--check` mode). Needs the
      # built codegen CLI (above). Keeps the generated client honest against the wire contract.
      - name: Codegen drift check
        run: pnpm codegen:check

      # Packaging correctness for the publishable packages: publint validates each
      # package.json (exports/types/files/bin), attw validates types resolution under
      # both module systems. Needs the built dist (above).
      - name: Publish check
        run: pnpm lint:publish

      # Runtime proof the built dist resolves both ways (ESM import + CJS require),
      # including the @haddowg/json-api-client/ajv sub-path export.
      - name: Dual ESM/CJS smoke
        run: pnpm smoke
