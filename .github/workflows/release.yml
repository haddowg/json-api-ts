name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC auth for npm trusted publishing + provenance signing

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Publishes every package whose version changed. Authentication is via
      # OIDC trusted publishing (no NPM_TOKEN) — each package must list this
      # repo + workflow as a trusted publisher on npmjs.com. --provenance signs
      # the build provenance using the same id-token permission above.
      # Requires pnpm >= 10 for OIDC support (see packageManager in package.json).
      - name: Publish
        run: pnpm -r publish --access public --no-git-checks --provenance
